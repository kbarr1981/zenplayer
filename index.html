<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;overflow:hidden}
body{font-family:"Inter",system-ui,-apple-system,sans-serif;background:#000;color:#f5ede0;font-weight:400;user-select:none;-webkit-user-select:none}
.app{width:100%;height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
header{z-index:20;display:flex;align-items:center;justify-content:space-between;padding:12px 20px;flex-shrink:0;gap:12px}
.logo{display:flex;flex-direction:column;align-items:flex-start;gap:0;line-height:1}
.logo-top{display:flex;align-items:center;gap:9px;height:39px}
.hav{width:59px;height:59px;border-radius:50%;object-fit:cover;border:1px solid rgba(212,165,116,.35);box-shadow:0 0 11px rgba(212,165,116,.2);flex-shrink:0}
.kanji{font-family:"Noto Serif JP",serif;color:#b07a51;font-size:28px}
.zt{font-family:"Cormorant Garamond",Georgia,serif;font-weight:300;letter-spacing:.4em;font-size:30px;color:#ff4a3f;text-shadow:0 0 11px rgba(255,74,63,1),0 0 22px rgba(255,74,63,.7),0 0 38px rgba(255,74,63,.5)}
.pt{font-family:"Cormorant Garamond",Georgia,serif;font-weight:300;letter-spacing:.4em;font-size:15px;color:#b5a898;margin-top:-4px;transition:margin-left .15s}
.nav{display:flex;gap:4px}
.nb{width:39px;height:39px;border-radius:50%;background:0 0;border:1px solid rgba(232,217,196,.15);color:#b5a898;cursor:pointer;display:flex;align-items:center;justify-content:center}
.nb.on{background:rgba(212,165,116,.15);border-color:rgba(212,165,116,.4);color:#e0b584}
.nb svg{width:16px;height:16px;stroke-width:1.5}
.v{display:none;flex:1;flex-direction:column;padding:0 20px 12px;overflow:hidden}
.v.on{display:flex}
canvas{position:absolute;inset:0;width:100%;height:100%}
.vw{position:relative;flex:0 0 150px;width:100%;margin-bottom:18px}
.np{text-align:center;display:flex;flex-direction:column;align-items:center}
.np{position:relative;z-index:2;text-align:center;pointer-events:none}
.prog{width:100%;max-width:28rem;margin:12px auto 0;flex-shrink:0}
.ptr{position:relative;height:6px;border-radius:99px;background:rgba(232,217,196,.14);overflow:hidden;cursor:pointer}
.ptr input{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer}
.pf{position:absolute;inset:0 auto 0 0;border-radius:99px;background:linear-gradient(90deg,#b07a51,#d4a574)}
.ctrls{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:20px;flex-shrink:0}
.cb{width:45px;height:45px;border-radius:50%;background:rgba(232,217,196,.04);border:1px solid rgba(232,217,196,.2);color:#e0b584;cursor:pointer;display:flex;align-items:center;justify-content:center}
.cb:active{transform:scale(.92)}
.cb svg{width:16px;height:16px;stroke-width:1.5;display:block}
.pb{width:64px;height:64px;background:linear-gradient(135deg,#d4a574,#b07a51);border:none;color:#1c1a17;box-shadow:0 0 30px rgba(212,165,116,.3)}
.pb:active{transform:scale(.95)}
.pb svg{width:21px;height:21px;display:block}
.vr{display:flex;align-items:center;gap:12px;margin:14px auto 0;width:100%;max-width:260px;flex-shrink:0}
.vbg{position:absolute;left:0;right:0;height:4px;border-radius:99px;background:rgba(232,217,196,.22)}
.vfl{position:absolute;left:0;height:4px;border-radius:99px;background:#d4a574}
.vt{position:relative;flex:1;height:20px;display:flex;align-items:center;cursor:pointer}
.vt input{position:absolute;inset:0;width:100%;height:20px;opacity:0;cursor:pointer}
.gw{margin-top:auto;padding:8px 0;display:flex;flex-direction:column;align-items:center;flex-shrink:0}
.gw img{width:200px;opacity:.95}
.gk{font-family:"Noto Serif JP",serif;color:#b07a51;font-size:28px;margin-top:6px;letter-spacing:.15em;opacity:.85}
.vh{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;margin-top:0}
#v1,#v2{padding-top:32px}
.vti{font-size:24px;color:#f5ede0;margin-top:34px}
.vti small{font-size:13px;color:#b5a898}
.abtn{display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:99px;background:rgba(212,165,116,.1);border:1px solid rgba(212,165,116,.3);color:#e0b584;font-size:11px;letter-spacing:.2em;cursor:pointer;font-family:inherit}
.abtn svg{width:13px;height:13px;stroke-width:1.5}
#tl{flex:1;overflow-y:auto;list-style:none}
#tl::-webkit-scrollbar{width:4px}
#tl::-webkit-scrollbar-thumb{background:rgba(212,165,116,.2);border-radius:4px}
.ed{width:100%;margin-top:32px;padding:60px 20px;border-radius:8px;border:1px dashed rgba(212,165,116,.25);color:#b5a898;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:12px;background:0 0;font-family:inherit}
.ed svg{width:28px;height:28px;stroke-width:1}
.ti{display:flex;align-items:center;gap:12px;padding:12px;border-radius:4px;border-left:2px solid transparent;cursor:pointer;transition:background .2s,opacity .15s,transform .22s cubic-bezier(.2,.8,.2,1),box-shadow .18s,border-color .18s;content-visibility:auto;contain-intrinsic-size:0 47px}
.ti.cur{background:rgba(212,165,116,.08);border-left-color:#e0b584}
.ti.dragging{opacity:.95;z-index:10;position:relative;background:rgba(212,165,116,.14);box-shadow:0 10px 28px rgba(0,0,0,.55),0 0 0 1px rgba(224,181,132,.35);transition:box-shadow .15s,background .15s;will-change:transform;cursor:grabbing}
.ti.dragover{border-top:2px solid #e0b584}
.ti .nm{font-size:10px;width:24px;color:#9a8e80;font-variant-numeric:tabular-nums}
.ti.cur .nm{color:#e0b584}
.ti .tn{flex:1;font-size:14px;color:#c9bfb0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ti.cur .tn{color:#f5ede0}
.ti .dl{background:0 0;border:0;color:#b5a898;padding:4px;cursor:pointer;opacity:.5}
.ti .dl svg{width:13px;height:13px;stroke-width:1.5}
.dh{cursor:grab;padding:4px;color:#b5a898;touch-action:none;display:flex;align-items:center}
.dh svg{width:16px;height:16px;stroke-width:1.5}
.bars{display:flex;gap:2px;align-items:flex-end;height:16px}
.bars span{width:2px;border-radius:2px;background:#e0b584;animation:b .8s ease-in-out infinite}
.bars span:nth-child(2){animation-delay:.15s}
.bars span:nth-child(3){animation-delay:.3s}
@keyframes b{0%,100%{height:4px}50%{height:14px}}
.lt{font-size:10px;letter-spacing:.4em;color:#fff}
.pr{display:flex;gap:8px;overflow-x:auto;margin-top:16px;margin-bottom:12px;padding-bottom:4px}
.pr::-webkit-scrollbar{display:none}
.prb{padding:6px 12px;border-radius:99px;background:0 0;border:1px solid rgba(232,217,196,.1);color:#b5a898;font-size:10px;letter-spacing:.2em;text-transform:uppercase;white-space:nowrap;cursor:pointer;font-family:inherit}
.prb.on{background:rgba(212,165,116,.15);border-color:rgba(212,165,116,.4);color:#e0b584}
.eqs{flex:0;display:flex;align-items:stretch;justify-content:space-between;gap:8px;padding:0 8px;min-height:210px}
.eqb{flex:1;display:flex;flex-direction:column;align-items:center;min-width:0}
.eqv{font-size:10px;margin-bottom:8px;color:#e0b584;font-variant-numeric:tabular-nums}
.eqsl{position:relative;flex:1;width:100%;display:flex;justify-content:center;cursor:pointer;touch-action:none;min-height:180px}
.eqt{position:relative;height:100%;width:3px;border-radius:99px;background:rgba(232,217,196,.14)}

<audio id="au" crossorigin="anonymous"></audio>
<input type="file" id="fi" accept="audio/*" multiple>

<script>
var F=[60,170,310,600,1e3,3e3,6e3,12e3],
P={flat:{60:0,170:0,310:0,600:0,1e3:0,3e3:0,6e3:0,12e3:0},bass:{60:8,170:6,310:3,600:0,1e3:0,3e3:0,6e3:1,12e3:2},vocal:{60:-2,170:-1,310:1,600:4,1e3:5,3e3:4,6e3:2,12e3:0},rock:{60:5,170:3,310:-1,600:-2,1e3:0,3e3:3,6e3:5,12e3:6},jazz:{60:3,170:2,310:1,600:2,1e3:-1,3e3:-1,6e3:1,12e3:3},classical:{60:4,170:3,310:0,600:0,1e3:0,3e3:0,6e3:3,12e3:4}},
T=[],ci=0,pl=false,vol=.8,cv=0,
eqV=Object.assign({},P.flat),eqN='flat',
actx,src,an,flt=[],gn,
au=document.getElementById('au'),
fi=document.getElementById('fi'),
can=document.getElementById('cv');

function fmt(s){if(!s||isNaN(s))return'0:00';return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0')}

function initAudio(){
if(actx)return;
actx=new(window.AudioContext||window.webkitAudioContext)();
src=actx.createMediaElementSource(au);
flt=F.map(function(f,i){var fl=actx.createBiquadFilter();fl.type=i===0?'lowshelf':i===F.length-1?'highshelf':'peaking';fl.frequency.value=f;fl.Q.value=1;fl.gain.value=eqV[f]||0;return fl});
an=actx.createAnalyser();an.fftSize=256;an.smoothingTimeConstant=.85;
gn=actx.createGain();gn.gain.value=vol;
src.connect(flt[0]);
for(var i=0;i<flt.length-1;i++)flt[i].connect(flt[i+1]);
flt[flt.length-1].connect(an);an.connect(gn);gn.connect(actx.destination);
}

var eqHist=null;
function draw(){
if(!can||!an){requestAnimationFrame(draw);return}
var c=can.getContext('2d'),dp=devicePixelRatio||1,r=can.getBoundingClientRect();
if(can.width!==r.width*dp){can.width=r.width*dp;can.height=r.height*dp;c.scale(dp,dp)}
var W=r.width,H=r.height;c.clearRect(0,0,W,H);
var bl=an.frequencyBinCount,d=new Uint8Array(bl);an.getByteFrequencyData(d);
var ds=5,dr=1.6,nb=Math.max(40,Math.floor(W/5.5));
if(!eqHist||eqHist.length!==nb){eqHist=new Array(nb);for(var k=0;k<nb;k++)eqHist[k]=0}
var step=bl/nb,maxN=Math.floor(H/ds);
for(var i=0;i<nb;i++){
var v=d[Math.floor(i*step)]/255;eqHist[i]=eqHist[i]*0.72+v*0.28;
var bh=eqHist[i]*H*0.95,x=(i+0.5)*(W/nb),nDots=Math.floor(bh/ds);
for(var j=0;j<nDots;j++){
var y=H-(j+0.5)*ds,t=j/Math.max(1,maxN-1);
var rC=Math.round(8+t*37),gC=Math.round(70+t*142),bC=Math.round(30+t*161);
var al=0.55+t*0.35;
c.fillStyle='rgba('+rC+','+gC+','+bC+','+al+')';
c.beginPath();c.arc(x,y,dr,0,Math.PI*2);c.fill();
}}
requestAnimationFrame(draw);
}

function upd(){
var ct=T[ci],dur=au.duration||0,cur=au.currentTime,pr=dur?(cur/dur)*100:0;
document.getElementById('nt').textContent=ct?ct.name:'silence';
document.getElementById('ns').textContent=T.length?'TRACK '+(ci+1)+' / '+T.length:'NO TRACKS LOADED';
document.getElementById('tc').textContent=fmt(cur);
document.getElementById('td').textContent=fmt(dur);
document.getElementById('pf').style.width=pr+'%';
document.getElementById('sb').value=pr;
document.getElementById('pico').innerHTML=pl?'<rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/>':'<polygon points="6 5 20 12 6 19 6 5"/>';
document.getElementById('vf').style.width=(vol*100)+'%';
document.getElementById('vn').textContent=Math.round(vol*100);
}

function sw(n){
cv=n;for(var i=0;i<3;i++){document.getElementById('v'+i).classList.toggle('on',i===n);document.getElementById('n'+i).classList.toggle('on',i===n)}
if(n===1)rpl();if(n===2)req();
}

function ld(){if(!T[ci])return;au.src=T[ci].url;au.load();if(pl){initAudio();if(actx.state==='suspended')actx.resume();au.play().catch(function(){pl=false})}upd();if(cv===1)rpl()}
function togglePlay(){if(!T.length)return;initAudio();if(actx.state==='suspended')actx.resume();if(au.paused){au.play();pl=true}else{au.pause();pl=false}upd()}
function doStop(){au.pause();au.currentTime=0;pl=false;upd()}
function doNext(){if(!T.length)return;ci=(ci+1)%T.length;pl=true;ld()}
function doPrev(){if(!T.length)return;if(au.currentTime>3){au.currentTime=0;return}ci=(ci-1+T.length)%T.length;pl=true;ld()}
function seek(d){au.currentTime=Math.max(0,Math.min(au.duration||0,au.currentTime+d))}

function rpl(){
document.getElementById('pc').innerHTML=T.length+' <small>track'+(T.length!==1?'s':'')+'</small>';
var tl=document.getElementById('tl');
if(!T.length){tl.innerHTML='<button class="ed" onclick="fi.click()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg><div style="font-size:12px;letter-spacing:.3em">LOAD TRACKS FROM DEVICE</div><div style="font-size:10px;color:#9a8e80">tap to select audio files</div></button>';return}
var h='';T.forEach(function(t,i){
h+='<div class="ti'+(i===ci?' cur':'')+'" data-i="'+i+'">';
h+='<div class="dh" data-d="'+i+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="4" y1="8" x2="20" y2="8"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="16" x2="20" y2="16"/></svg></div>';
h+='<span class="nm">'+String(i+1).padStart(2,'0')+'</span><span class="tn">'+t.name+'</span>';
if(i===ci&&pl)h+='<div class="bars"><span></span><span></span><span></span></div>';
h+='<button class="dl" data-id="'+t.id+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button></div>';
});
tl.innerHTML=h;
// Drag to reorder (handle = immediate, long-press on item body = ~450ms)
var items=tl.querySelectorAll('.ti'),handles=tl.querySelectorAll('.dh');
var dragSrc=null,dragEl=null,overIdx=null,suppressClick=false,startY=0;
function clearDragVis(){items.forEach(function(it){it.classList.remove('dragging','dragover');it.style.transform=''})}
function startDrag(idx,el,pid,y){dragSrc=idx;dragEl=el;overIdx=null;startY=y;el.classList.add('dragging');try{el.setPointerCapture(pid)}catch(_){}if(navigator.vibrate)navigator.vibrate(35)}
function moveDrag(y){if(dragSrc===null)return;dragEl.style.transform='translateY('+(y-startY)+'px)';overIdx=null;items.forEach(function(it,j){it.classList.remove('dragover');if(j===dragSrc)return;var r=it.getBoundingClientRect();if(y>r.top&&y<r.bottom){it.classList.add('dragover');overIdx=j}})}
function endDrag(){if(dragSrc===null)return;var di=dragSrc;if(dragEl)dragEl.style.transition='transform .18s cubic-bezier(.2,.8,.2,1),box-shadow .15s,background .15s';clearDragVis();if(overIdx!==null&&overIdx!==di){var tk=T.splice(di,1)[0];T.splice(overIdx,0,tk);if(ci===di)ci=overIdx;else if(di<ci&&overIdx>=ci)ci--;else if(di>ci&&overIdx<=ci)ci++;rpl();upd()}dragSrc=null;dragEl=null;overIdx=null;suppressClick=true;setTimeout(function(){suppressClick=false},350)}
handles.forEach(function(dh){var di=parseInt(dh.dataset.d);dh.onpointerdown=function(e){e.preventDefault();e.stopPropagation();startDrag(di,items[di],e.pointerId,e.clientY);dh.onpointermove=function(ev){moveDrag(ev.clientY)};dh.onpointerup=function(){dh.onpointermove=null;dh.onpointerup=null;endDrag()};dh.onpointercancel=dh.onpointerup}});
items.forEach(function(it){var di=parseInt(it.dataset.i),holdT=null,sx=0,sy=0;it.addEventListener('pointerdown',function(e){if(e.target.closest('.dh')||e.target.closest('.dl'))return;sx=e.clientX;sy=e.clientY;var pid=e.pointerId;holdT=setTimeout(function(){holdT=null;startDrag(di,it,pid,sy)},450)});it.addEventListener('pointermove',function(e){if(holdT&&(Math.abs(e.clientY-sy)>10||Math.abs(e.clientX-sx)>10)){clearTimeout(holdT);holdT=null}if(dragSrc===di){e.preventDefault();moveDrag(e.clientY)}},{passive:false});var endIt=function(){if(holdT){clearTimeout(holdT);holdT=null}if(dragSrc===di)endDrag()};it.addEventListener('pointerup',endIt);it.addEventListener('pointercancel',endIt)});
// Tap to play and delete
tl.onclick=function(e){
if(suppressClick){e.stopPropagation();return}
var dl=e.target.closest('.dl');
if(dl){e.stopPropagation();var id=dl.dataset.id,idx=T.findIndex(function(t){return t.id===id});if(idx<0)return;URL.revokeObjectURL(T[idx].url);T.splice(idx,1);if(idx===ci){au.pause();pl=false;ci=0;if(T.length)ld()}else if(idx<ci)ci--;rpl();upd();return}
var it=e.target.closest('.ti');if(it&&!e.target.closest('.dh')){ci=parseInt(it.dataset.i);pl=true;ld();sw(0)}};
}

var eqBuilt=false;
function req(){
document.getElementById('epl').textContent='· '+eqN;
var pw=document.getElementById('prw');
var ph='';Object.keys(P).forEach(function(n){ph+='<button class="prb'+(eqN===n?' on':'')+'" data-p="'+n+'">'+n+'</button>'});
pw.innerHTML=ph;
pw.onclick=function(e){var b=e.target.closest('.prb');if(b){eqN=b.dataset.p;eqV=Object.assign({},P[eqN]);if(flt.length)flt.forEach(function(fl,i){fl.gain.value=eqV[F[i]]||0});req()}};
if(!eqBuilt){
var ew=document.getElementById('eqw'),sh='';
F.forEach(function(f){
sh+='<div class="eqb"><div class="eqv" data-ev="'+f+'">0</div>';
sh+='<div class="eqsl" data-ef="'+f+'"><div class="eqt"><div class="eqf" data-ef2="'+f+'"></div></div><div class="eqth" data-et="'+f+'"></div></div>';
sh+='<div class="eqfr">'+(f>=1e3?f/1e3+'k':f)+'</div></div>';
});
ew.innerHTML=sh;eqBuilt=true;
ew.querySelectorAll('.eqsl').forEach(function(el){
var fr=parseInt(el.dataset.ef),drag=false;
function u(cy){var r=el.getBoundingClientRect(),y=cy-r.top,h=r.height,ratio=Math.max(0,Math.min(1,y/h));
var val=Math.round((12-ratio*24)*2)/2;val=Math.max(-12,Math.min(12,val));
eqV[fr]=val;eqN='custom';if(flt.length)flt.forEach(function(fl,i){fl.gain.value=eqV[F[i]]||0});ueq()}
el.onpointerdown=function(e){e.preventDefault();drag=true;el.setPointerCapture(e.pointerId);u(e.clientY)};
el.onpointermove=function(e){if(drag)u(e.clientY)};
el.onpointerup=function(e){drag=false;el.releasePointerCapture(e.pointerId)};
el.onpointercancel=function(){drag=false};
});
}
ueq();
}

function ueq(){
document.getElementById('epl').textContent='· '+eqN;
