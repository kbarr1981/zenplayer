var W=r.width,H=r.height;c.clearRect(0,0,W,H);
var bl=an.frequencyBinCount,d=new Uint8Array(bl);an.getByteFrequencyData(d);
var ds=5,dr=1.6,nb=Math.max(40,Math.floor(W/5.5));
if(!eqHist||eqHist.length!==nb){eqHist=new Array(nb);for(var k=0;k<nb;k++)eqHist[k]=0}
var step=bl/nb,maxN=Math.floor(H/ds);
for(var i=0;i<nb;i++){
var v=d[Math.floor(i*step)]/255;eqHist[i]=eqHist[i]*0.72+v*0.28;
var bh=eqHist[i]*H*0.95,x=(i+0.5)*(W/nb),nDots=Math.floor(bh/ds);
for(var j=0;j<nDots;j++){
var y=H-(j+0.5)*ds,t=j/Math.max(1,maxN-1);
var rC=Math.round(8+t*37),gC=Math.round(70+t*142),bC=Math.round(30+t*161);
var al=0.55+t*0.35;
c.fillStyle='rgba('+rC+','+gC+','+bC+','+al+')';
c.beginPath();c.arc(x,y,dr,0,Math.PI*2);c.fill();
}}
drawRAF=requestAnimationFrame(draw);
}
function startDraw(){if(!drawRAF&&!document.hidden&&an)drawRAF=requestAnimationFrame(draw)}
document.addEventListener('visibilitychange',function(){if(!document.hidden)startDraw()});

function upd(){
var ct=T[ci],dur=au.duration||0,cur=au.currentTime,pr=dur?(cur/dur)*100:0;
document.getElementById('nt').textContent=ct?ct.name:'silence';
document.getElementById('ns').textContent=T.length?'TRACK '+(ci+1)+' / '+T.length:'NO TRACKS LOADED';
document.getElementById('tc').textContent=fmt(cur);
document.getElementById('td').textContent=fmt(dur);
document.getElementById('pf').style.width=pr+'%';
document.getElementById('sb').value=pr;
document.getElementById('pico').innerHTML=pl?'<rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/>':'<polygon points="6 5 20 12 6 19 6 5"/>';
document.getElementById('vf').style.width=(vol*100)+'%';
document.getElementById('vn').textContent=Math.round(vol*100);
}

function sw(n){
cv=n;for(var i=0;i<3;i++){document.getElementById('v'+i).classList.toggle('on',i===n);document.getElementById('n'+i).classList.toggle('on',i===n)}
if(n===1)rpl();if(n===2)req();
}

function ld(){if(!T[ci])return;au.src=T[ci].url;au.load();if(pl){initAudio();if(actx.state==='suspended')actx.resume();au.play().catch(function(){pl=false})}upd();if(cv===1)rpl()}
function togglePlay(){if(!T.length)return;initAudio();if(actx.state==='suspended')actx.resume();if(au.paused){au.play();pl=true}else{au.pause();pl=false}upd()}
function doStop(){au.pause();au.currentTime=0;pl=false;upd()}
function doNext(){if(!T.length)return;ci=(ci+1)%T.length;pl=true;ld()}
function doPrev(){if(!T.length)return;if(au.currentTime>3){au.currentTime=0;return}ci=(ci-1+T.length)%T.length;pl=true;ld()}
function seek(d){au.currentTime=Math.max(0,Math.min(au.duration||0,au.currentTime+d))}

function rpl(){
document.getElementById('pc').innerHTML=T.length+' <small>track'+(T.length!==1?'s':'')+'</small>';
var tl=document.getElementById('tl');
if(!T.length){tl.innerHTML='<div class="ed-wrap"><button class="ed" onclick="pickFi()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg><div style="font-size:12px;letter-spacing:.3em">LOAD TRACKS FROM DEVICE</div><div style="font-size:10px;color:#9a8e80">tap to select audio files</div></button><button type="button" class="ed-folder" onclick="pickFd()">OR LOAD A FOLDER</button></div>';return}
var h='';T.forEach(function(t,i){
h+='<div class="ti'+(i===ci?' cur':'')+'" data-i="'+i+'">';
h+='<div class="dh" data-d="'+i+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="4" y1="8" x2="20" y2="8"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="16" x2="20" y2="16"/></svg></div>';
h+='<span class="nm">'+String(i+1).padStart(2,'0')+'</span><span class="tn">'+t.name+'</span>';
if(i===ci&&pl)h+='<div class="bars"><span></span><span></span><span></span></div>';
h+='<button class="dl" data-id="'+t.id+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button></div>';
});
tl.innerHTML=h;
// Drag to reorder (handle = immediate, long-press on item body = ~450ms)
var items=tl.querySelectorAll('.ti'),handles=tl.querySelectorAll('.dh');
var dragSrc=null,dragEl=null,overIdx=null,suppressClick=false,startY=0;
function clearDragVis(){items.forEach(function(it){it.classList.remove('dragging','dragover');it.style.transform=''})}
function startDrag(idx,el,pid,y){dragSrc=idx;dragEl=el;overIdx=null;startY=y;el.classList.add('dragging');try{el.setPointerCapture(pid)}catch(_){}if(navigator.vibrate)navigator.vibrate(35)}
function moveDrag(y){if(dragSrc===null)return;dragEl.style.transform='translateY('+(y-startY)+'px)';overIdx=null;items.forEach(function(it,j){it.classList.remove('dragover');if(j===dragSrc)return;var r=it.getBoundingClientRect();if(y>r.top&&y<r.bottom){it.classList.add('dragover');overIdx=j}})}
function endDrag(){if(dragSrc===null)return;var di=dragSrc;if(dragEl)dragEl.style.transition='transform .18s cubic-bezier(.2,.8,.2,1),box-shadow .15s,background .15s';clearDragVis();if(overIdx!==null&&overIdx!==di){var tk=T.splice(di,1)[0];T.splice(overIdx,0,tk);if(ci===di)ci=overIdx;else if(di<ci&&overIdx>=ci)ci--;else if(di>ci&&overIdx<=ci)ci++;rpl();upd()}dragSrc=null;dragEl=null;overIdx=null;suppressClick=true;setTimeout(function(){suppressClick=false},350)}
handles.forEach(function(dh){var di=parseInt(dh.dataset.d);dh.onpointerdown=function(e){e.preventDefault();e.stopPropagation();startDrag(di,items[di],e.pointerId,e.clientY);dh.onpointermove=function(ev){moveDrag(ev.clientY)};dh.onpointerup=function(){dh.onpointermove=null;dh.onpointerup=null;endDrag()};dh.onpointercancel=dh.onpointerup}});
items.forEach(function(it){var di=parseInt(it.dataset.i),holdT=null,sx=0,sy=0;it.addEventListener('pointerdown',function(e){if(e.target.closest('.dh')||e.target.closest('.dl'))return;sx=e.clientX;sy=e.clientY;var pid=e.pointerId;holdT=setTimeout(function(){holdT=null;startDrag(di,it,pid,sy)},450)});it.addEventListener('pointermove',function(e){if(holdT&&(Math.abs(e.clientY-sy)>10||Math.abs(e.clientX-sx)>10)){clearTimeout(holdT);holdT=null}if(dragSrc===di){e.preventDefault();moveDrag(e.clientY)}},{passive:false});var endIt=function(){if(holdT){clearTimeout(holdT);holdT=null}if(dragSrc===di)endDrag()};it.addEventListener('pointerup',endIt);it.addEventListener('pointercancel',endIt)});
// Tap to play and delete
tl.onclick=function(e){
if(suppressClick){e.stopPropagation();return}
var dl=e.target.closest('.dl');
if(dl){e.stopPropagation();var id=dl.dataset.id,idx=T.findIndex(function(t){return t.id===id});if(idx<0)return;URL.revokeObjectURL(T[idx].url);T.splice(idx,1);if(idx===ci){au.pause();pl=false;ci=0;if(T.length)ld()}else if(idx<ci)ci--;rpl();upd();return}
var it=e.target.closest('.ti');if(it&&!e.target.closest('.dh')){ci=parseInt(it.dataset.i);pl=true;ld();sw(0)}};
updTotal();
}

var eqBuilt=false;
function req(){
document.getElementById('epl').textContent='· '+eqN;
var pw=document.getElementById('prw');
var ph='';Object.keys(P).forEach(function(n){ph+='<button class="prb'+(eqN===n?' on':'')+'" data-p="'+n+'">'+n+'</button>'});
pw.innerHTML=ph;
pw.onclick=function(e){var b=e.target.closest('.prb');if(b){eqN=b.dataset.p;eqV=Object.assign({},P[eqN]);if(flt.length)flt.forEach(function(fl,i){fl.gain.value=eqV[F[i]]||0});req()}};
if(!eqBuilt){
var ew=document.getElementById('eqw'),sh='';
F.forEach(function(f){
sh+='<div class="eqb"><div class="eqv" data-ev="'+f+'">0</div>';
sh+='<div class="eqsl" data-ef="'+f+'"><div class="eqt"><div class="eqf" data-ef2="'+f+'"></div></div><div class="eqth" data-et="'+f+'"></div></div>';
sh+='<div class="eqfr">'+(f>=1e3?f/1e3+'k':f)+'</div></div>';
});
ew.innerHTML=sh;eqBuilt=true;
ew.querySelectorAll('.eqsl').forEach(function(el){
var fr=parseInt(el.dataset.ef),drag=false;
function u(cy){var r=el.getBoundingClientRect(),y=cy-r.top,h=r.height,ratio=Math.max(0,Math.min(1,y/h));
var val=Math.round((12-ratio*24)*2)/2;val=Math.max(-12,Math.min(12,val));
eqV[fr]=val;eqN='custom';if(flt.length)flt.forEach(function(fl,i){fl.gain.value=eqV[F[i]]||0});ueq()}
el.onpointerdown=function(e){e.preventDefault();drag=true;el.setPointerCapture(e.pointerId);u(e.clientY)};
el.onpointermove=function(e){if(drag)u(e.clientY)};
el.onpointerup=function(e){drag=false;el.releasePointerCapture(e.pointerId)};
el.onpointercancel=function(){drag=false};
});
}
ueq();
}

function ueq(){
document.getElementById('epl').textContent='· '+eqN;
document.querySelectorAll('.prb').forEach(function(b){b.classList.toggle('on',b.dataset.p===eqN)});
F.forEach(function(f){
var v=eqV[f]||0,pct=((12-v)/24)*100,fh=(Math.abs(v)/12)*50;
var th=document.querySelector('[data-et="'+f+'"]'),fl=document.querySelector('[data-ef2="'+f+'"]'),vl=document.querySelector('[data-ev="'+f+'"]');
if(th)th.style.top=pct+'%';
if(fl){if(v>=0){fl.style.top='';fl.style.bottom='50%';fl.style.height=fh+'%'}else{fl.style.bottom='';fl.style.top='50%';fl.style.height=fh+'%'}}
if(vl)vl.textContent=(v>0?'+':'')+v;
});
}

function fmtDur(s){if(!s||!isFinite(s))return '0:00';var h=Math.floor(s/3600),m=Math.floor((s%3600)/60),x=Math.floor(s%60);return (h>0?h+':'+String(m).padStart(2,'0'):m)+':'+String(x).padStart(2,'0')}
var dQ=[],dBusy=false;
function dNext(){if(dBusy)return;var t=dQ.shift();if(!t)return;if(t.duration!==undefined){dNext();return}dBusy=true;var a=new Audio();a.preload='metadata';var done=function(d){t.duration=d;updTotal();try{a.removeAttribute('src');a.load()}catch(e){}a=null;dBusy=false;dNext()};a.addEventListener('loadedmetadata',function(){done(a.duration||0)});a.addEventListener('error',function(){done(0)});a.src=t.url}
function loadDur(t){if(t.duration!==undefined)return;dQ.push(t);dNext()}
function updTotal(){var tot=T.reduce(function(s,t){return s+(t.duration||0)},0);var el=document.getElementById('pdur');if(el)el.textContent=fmtDur(tot)}
function addFiles(files){
var audio=Array.from(files||[]).filter(function(f){return f.type.startsWith('audio/')||/\.(mp3|m4a|aac|flac|ogg|opus|wav|webm)$/i.test(f.name)});
var was=!T.length;
audio.forEach(function(f){var t={id:f.name+'-'+f.size+'-'+Date.now()+'-'+Math.random(),name:f.name.replace(/\.[^.]+$/,''),url:URL.createObjectURL(f)};T.push(t);loadDur(t)});
if(was&&T.length)ld();if(cv===1)rpl();upd();
}
fi.onchange=function(e){addFiles(e.target.files);e.target.value=''};
fd.onchange=function(e){addFiles(e.target.files);e.target.value=''};
function pickFi(){setTimeout(function(){fi.click()},0)}
function pickFd(){setTimeout(function(){fd.click()},0)}
document.getElementById('ab').onclick=pickFi;
document.getElementById('ab2').onclick=pickFd;
document.getElementById('sb').oninput=function(){au.currentTime=(this.value/100)*(au.duration||0)};
document.getElementById('vb').oninput=function(){vol=parseFloat(this.value);if(gn)gn.gain.value=vol;document.getElementById('vf').style.width=(vol*100)+'%';document.getElementById('vn').textContent=Math.round(vol*100)};
au.ontimeupdate=upd;
au.onloadedmetadata=upd;
au.onended=doNext;
au.onplay=startDraw;
upd();
function pickQuote(){var el=document.getElementById('qq');if(!el||!QQ.length)return;el.textContent=QQ[Math.floor(Math.random()*QQ.length)]}
pickQuote();
function alignPt(){var zt=document.querySelector('.zt'),pt=document.querySelector('.pt'),logo=document.querySelector('.logo');if(!zt||!pt||!logo)return;var ztR=zt.getBoundingClientRect(),lR=logo.getBoundingClientRect();pt.style.marginLeft=Math.max(0,ztR.left-lR.left)+'px'}
function alignAll(){alignPt()}
window.addEventListener('load',alignAll);window.addEventListener('resize',alignAll);if(document.fonts&&document.fonts.ready)document.fonts.ready.then(alignAll);setTimeout(alignAll,200);setTimeout(alignAll,800);
</script>
